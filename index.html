<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lars Geissbauer | AI Engineer für starke Produktteams</title>
    <meta
      name="description"
      content="Bilingual CV website for Lars Geissbauer, Senior AI Engineer focused on AI engineering, system integration, trading-system monitoring, algorithms, and high-output product teams."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%230f2030'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia, serif' font-size='28' font-weight='700' fill='%23f6efe2'%3ELG%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scroll-progress" aria-hidden="true">
      <span class="scroll-progress-bar"></span>
    </div>

    <div class="page-shell">
      <div class="bg-orb orb-a"></div>
      <div class="bg-orb orb-b"></div>
      <div class="bg-orb orb-c"></div>
      <div class="mesh-glow" aria-hidden="true"></div>

      <header class="topbar">
        <a class="brand" href="#top" aria-label="Start">
          <span class="brand-mark">LG</span>
          <span>
            <strong>Lars Geissbauer</strong>
            <small id="brandRole">Senior AI Engineer</small>
          </span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primaryNavPanel"
          aria-label="Navigation öffnen"
        >
          <span class="nav-toggle-label">Menü</span>
          <span class="nav-toggle-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>

        <div class="topbar-panel" id="primaryNavPanel">
          <nav class="nav" aria-label="Primary navigation">
            <a href="#profile" data-nav="profile"></a>
            <a href="#impact" data-nav="impact"></a>
            <a href="#experience" data-nav="experience"></a>
            <a href="#skills" data-nav="skills"></a>
            <a href="#contact" data-nav="contact"></a>
          </nav>

          <div class="topbar-actions">
            <div class="lang-switch" aria-label="Language switcher">
              <button class="lang-btn is-active" type="button" data-lang="de">DE</button>
              <button class="lang-btn" type="button" data-lang="en">EN</button>
            </div>
          </div>
        </div>
      </header>

      <main id="top">
        <section class="hero section" id="profile">
          <div class="hero-copy reveal">
            <div class="eyebrow-row">
              <span class="eyebrow-pill" id="heroPillPrimary"></span>
              <span class="eyebrow-pill eyebrow-pill-muted" id="heroPillSecondary"></span>
            </div>

            <p class="section-kicker" id="heroKicker"></p>
            <h1 id="heroTitle"></h1>
            <p class="hero-lead" id="heroLead"></p>

            <div class="hero-actions">
              <a class="button button-primary" href="#contact" id="heroPrimaryCta"></a>
              <a class="button button-ghost" href="#experience" id="heroSecondaryCta"></a>
            </div>

            <div class="trust-strip reveal" data-delay="120" id="trustStrip"></div>
          </div>

          <aside class="hero-visual reveal" data-delay="120">
            <div class="avatar-panel spotlight-card">
              <div class="avatar-card">
                <div class="avatar-meta">
                  <p class="panel-label" id="avatarLabel"></p>
                  <h2 id="avatarTitle"></h2>
                  <p id="avatarText"></p>
                </div>
              </div>

              <div class="hero-stat-stack" id="heroStats"></div>
            </div>
          </aside>
        </section>

        <section class="section marquee-section reveal" data-delay="100">
          <div class="marquee" id="marqueeTags"></div>
        </section>

        <section class="section section-intro-block">
          <div class="section-heading reveal">
            <p class="section-kicker" id="storyKicker"></p>
            <h2 id="storyTitle"></h2>
            <p class="section-copy" id="storyIntro"></p>
          </div>

          <div class="story-layout">
            <article class="story-card spotlight-card reveal">
              <p class="panel-label" id="summaryLabel"></p>
              <h3 id="summaryTitle"></h3>
              <p id="summaryBody"></p>
            </article>

            <article class="story-card reveal" data-delay="120">
              <p class="panel-label" id="strengthsLabel"></p>
              <h3 id="strengthsTitle"></h3>
              <div class="promise-list" id="promiseList"></div>
            </article>
          </div>
        </section>

        <section class="section" id="impact">
          <div class="section-heading reveal">
            <p class="section-kicker" id="impactKicker"></p>
            <h2 id="impactTitle"></h2>
            <p class="section-copy" id="impactIntro"></p>
          </div>

          <div class="impact-grid" id="impactGrid"></div>
        </section>

        <section class="section" id="experience">
          <div class="section-heading reveal">
            <p class="section-kicker" id="experienceKicker"></p>
            <h2 id="experienceTitle"></h2>
            <p class="section-copy" id="experienceIntro"></p>
          </div>

          <div class="timeline" id="timeline"></div>
        </section>

        <section class="section" id="skills">
          <div class="section-heading reveal">
            <p class="section-kicker" id="skillsKicker"></p>
            <h2 id="skillsTitle"></h2>
            <p class="section-copy" id="skillsIntro"></p>
          </div>

          <div class="skills-layout">
            <article class="skills-panel spotlight-card reveal">
              <p class="panel-label" id="techStackLabel"></p>
              <h3 id="techStackTitle"></h3>
              <div class="tag-cloud" id="techStackCloud"></div>
            </article>

            <article class="skills-panel reveal" data-delay="100">
              <p class="panel-label" id="domainLabel"></p>
              <h3 id="domainTitle"></h3>
              <ul class="detail-list" id="domainList"></ul>
            </article>

            <article class="skills-panel reveal" data-delay="180">
              <p class="panel-label" id="deliveryLabel"></p>
              <h3 id="deliveryTitle"></h3>
              <ul class="detail-list" id="deliveryList"></ul>
            </article>

            <article class="skills-panel reveal" data-delay="260">
              <p class="panel-label" id="softSkillsLabel"></p>
              <h3 id="softSkillsTitle"></h3>
              <ul class="detail-list" id="softSkillsList"></ul>
            </article>
          </div>
        </section>

        <section class="section" id="education">
          <div class="section-heading reveal">
            <p class="section-kicker" id="educationKicker"></p>
            <h2 id="educationTitle"></h2>
          </div>

          <div class="education-card reveal spotlight-card">
            <div class="education-main">
              <p class="panel-label" id="educationInstitution"></p>
              <h3 id="educationDegree"></h3>
              <p id="educationProgram"></p>
              <span id="educationYears"></span>
            </div>

            <div class="education-details" id="educationDetails"></div>
          </div>
        </section>

        <section class="section" id="contact">
          <div class="section-heading reveal">
            <p class="section-kicker" id="contactKicker"></p>
            <h2 id="contactTitle"></h2>
            <p class="section-copy" id="contactIntro"></p>
          </div>

          <div class="contact-layout">
            <div class="contact-grid" id="contactGrid"></div>

            <aside class="contact-panel spotlight-card reveal" data-delay="120">
              <p class="panel-label" id="contactPanelLabel"></p>
              <h3 id="contactPanelTitle"></h3>
              <p id="contactPanelText"></p>
              <div class="contact-actions">
                <a class="button button-ghost" href="#top" id="contactBackTop"></a>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
